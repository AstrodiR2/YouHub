name: Build YouHub

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Download ReVanced CLI
        run: |
          curl -L -o cli.jar $(curl -s https://api.github.com/repos/ReVanced/revanced-cli/releases/latest | grep browser_download_url | grep all.jar | cut -d '"' -f 4)

      - name: Download ReVanced Patches
        run: |
          curl -L -o patches.jar $(curl -s https://api.github.com/repos/ReVanced/revanced-patches/releases/latest | grep browser_download_url | cut -d '"' -f 4 | head -n 1)

      - name: Build placeholder
        run: echo "ready"
