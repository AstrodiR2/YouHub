name: Build YouHub

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Download ReVanced CLI
        run: curl -L -o cli.jar https://github.com/ReVanced/revanced-cli/releases/latest/download/revanced-cli.jar

      - name: Download patches
        run: curl -L -o patches.jar https://github.com/ReVanced/revanced-patches/releases/latest/download/revanced-patches.jar

      - name: Build placeholder
        run: echo "build running"

