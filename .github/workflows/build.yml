name: Build YouHub

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Download ReVanced CLI
        run: |
          curl -L -o cli.jar https://github.com/ReVanced/revanced-cli/releases/latest/download/revanced-cli.jar

      - name: Download ReVanced Patches
        run: |
          curl -L -o patches.jar https://github.com/ReVanced/revanced-patches/releases/latest/download/revanced-patches.jar

      - name: Download YouTube APK (working version)
        run: |
          curl -L -o youtube.apk https://d.apkpure.com/b/APK/com.google.android.youtube

      - name: Patch APK
        run: |
          java -jar cli.jar \
            -a youtube.apk \
            -o YouHub.apk \
            -b patches.jar \
            -i patches.txt \
            -c options.json

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: YouHub
          path: YouHub.apk
